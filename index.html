<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbit Lab — Physics & astronomy sims for the classroom</title>
<link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="sims/SimCore.jsx"></script>
<script type="text/babel" src="sims/OrbitalSim.jsx"></script>
<script type="text/babel" src="sims/PendulumSim.jsx"></script>
<script type="text/babel" src="sims/WaveSim.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ----- Nav with scroll spy + condense -----
const NAV_ITEMS = [
  { id: 'sims',     label: 'Sims' },
  { id: 'features', label: 'For educators' },
  { id: 'howto',    label: 'How it works' },
  { id: 'faq',      label: 'FAQ' },
];

const Nav = () => {
  const [condensed, setCondensed] = useState(false);
  const [active, setActive] = useState('');
  useEffect(() => {
    const onScroll = () => {
      setCondensed(window.scrollY > 24);
      // find closest section
      let cur = '';
      for (const {id} of NAV_ITEMS) {
        const el = document.getElementById(id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top < 140) cur = id;
      }
      setActive(cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={'nav' + (condensed ? ' condensed' : '')} data-screen-label="nav">
      <a href="#top" className="nav-brand" aria-label="Orbit Lab home">
        <img src="assets/logo.svg" alt="Orbit Lab"/>
      </a>
      <div className="nav-links">
        {NAV_ITEMS.map(n => (
          <a key={n.id} href={'#' + n.id} className={active === n.id ? 'active' : ''}>{n.label}</a>
        ))}
      </div>
      <div className="nav-cta">
        <a href="#sims" className="link-ghost">Try a sim</a>
        <a href="#sims" className="btn primary">Open workbench <Icon.Arrow style={{width:14,height:14}}/></a>
      </div>
    </nav>
  );
};

// ----- Hero -----
const Hero = () => (
  <section className="hero" id="top" data-screen-label="hero">
    <div className="hero-text">
      <div className="eyebrow"><span className="dot"/> Physics & astronomy sims for the classroom</div>
      <h1 className="hero-h">Run the experiment<br/><span className="hl">before the bell rings.</span></h1>
      <p className="lead">
        A browser-based workbench of physics and astronomy simulations. Every variable is a
        slider. Every sim is projector-ready. Turn "what if?" into an answer in under a minute.
      </p>
      <div className="hero-cta">
        <a className="btn primary lg" href="#sims">Open the workbench <Icon.Arrow style={{width:16,height:16}}/></a>
        <a className="btn secondary lg" href="#features">For educators</a>
      </div>
      <div className="hero-meta numeric">
        <span>60+ sims</span>
        <span className="dot">·</span>
        <span>Runs in any browser</span>
        <span className="dot">·</span>
        <span>No student sign-in</span>
      </div>
    </div>
    <OrbitalHero/>
  </section>
);

// ----- Sim library (interactive workbench) -----
const SIM_TABS = [
  { id: 'orbit',    tag: 'Astronomy', title: 'Orbital Motion',    blurb: "Kepler's first and third laws, live. Drag eccentricity from zero to comet.", Comp: OrbitalSim },
  { id: 'pendulum', tag: 'Mechanics', title: 'Simple Pendulum',   blurb: 'Period, length, gravity. Swap Earth for Jupiter and watch T collapse.',       Comp: PendulumSim },
  { id: 'wave',     tag: 'Waves',     title: 'Wave Interference', blurb: 'Superpose two sine waves. Find the beats. Flip a phase and silence them.',  Comp: WaveSim },
];

const SimLibrary = () => {
  const [active, setActive] = useState('orbit');
  const current = SIM_TABS.find(s => s.id === active);
  const Comp = current.Comp;
  return (
    <section className="sim-lib" id="sims" data-screen-label="sims">
      <div className="wrap">
        <div className="section-head">
          <div className="eyebrow">Three of sixty · try it now</div>
          <h2>The workbench, live.</h2>
          <p className="lead">No install, no account. Drag a slider, watch the physics respond.</p>
        </div>
        <div className="sim-tabs" role="tablist">
          {SIM_TABS.map(s => (
            <button
              key={s.id}
              role="tab"
              aria-selected={active === s.id}
              className={'sim-tab' + (active === s.id ? ' active' : '')}
              onClick={() => setActive(s.id)}
            >
              {s.id === 'orbit' && <Icon.Orbit style={{width:14,height:14}}/>}
              {s.id === 'pendulum' && <Icon.Pendulum style={{width:14,height:14}}/>}
              {s.id === 'wave' && <Icon.Wave style={{width:14,height:14}}/>}
              {s.title}
              <span className="tag">{s.tag}</span>
            </button>
          ))}
        </div>
        <div className="sim-workbench">
          <Comp key={active}/>
        </div>
        <div style={{textAlign:'center', marginTop: 28, color:'var(--ink-soft)', fontSize: 14}}>
          <strong>{current.title}</strong> — {current.blurb}
        </div>
      </div>
    </section>
  );
};

// ----- Features -----
const FEATURES = [
  {
    h: 'Tweak, then re-tweak.',
    p: 'Every variable is a slider. Change a mass, drag time, rewind. Your class sees the change in the same breath.',
    bullets: ['Live update — no recompute button', 'Rewind + scrub any simulation', 'Reset to defaults in one click'],
    visual: 'tweak',
  },
  {
    h: 'Projector-ready in one click.',
    p: 'Fullscreen designed for a 3,000-lumen projector at the back of a 10am classroom. High contrast, large type, no floating toolbars.',
    bullets: ['High-contrast present mode', '24px minimum type at 1080p', 'Works on any browser, any OS'],
    visual: 'project',
    flip: true,
  },
  {
    h: 'Lesson plans attached.',
    p: 'Every sim ships with a 20-minute lesson plan, a student worksheet, and three discussion prompts — written by practicing teachers.',
    bullets: ['Aligned to NGSS & AP Physics', 'Editable Google Docs or PDF', 'One click to share with your class'],
    visual: 'lesson',
  },
];

const FeatureVisual = ({ kind }) => {
  if (kind === 'tweak') {
    return (
      <svg viewBox="0 0 400 300" style={{width:'100%', height:'100%'}}>
        <rect width="400" height="300" fill="#F3ECDA"/>
        <g transform="translate(40, 40)">
          {[0, 1, 2, 3].map(i => (
            <g key={i} transform={`translate(0, ${i * 50})`}>
              <text x="0" y="12" fontFamily="DM Sans, sans-serif" fontWeight="500" fontSize="12" fill="#16213A">
                {['Mass','Length','Gravity','Damping'][i]}
              </text>
              <rect x="0" y="22" width="320" height="6" rx="3" fill="#E7DEC6" stroke="#16213A" strokeWidth="1.2"/>
              <circle cx={40 + i * 70} cy="25" r="10" fill="#1E9E84" stroke="#16213A" strokeWidth="1.5"/>
              <text x="290" y="16" fontFamily="JetBrains Mono, monospace" fontSize="11" fill="#16213A" textAnchor="end">
                {['2.4 kg','1.8 m','9.8 m/s²','0.05'][i]}
              </text>
            </g>
          ))}
        </g>
        <g transform="translate(40, 250)">
          <rect x="0" y="0" width="70" height="24" rx="12" fill="#1E9E84" stroke="#16213A" strokeWidth="1.5"/>
          <text x="35" y="16" fontFamily="DM Sans, sans-serif" fontSize="11" fontWeight="600" fill="#fff" textAnchor="middle">Apply</text>
          <rect x="80" y="0" width="70" height="24" rx="12" fill="#fff" stroke="#16213A" strokeWidth="1.5"/>
          <text x="115" y="16" fontFamily="DM Sans, sans-serif" fontSize="11" fontWeight="600" fill="#16213A" textAnchor="middle">Reset</text>
        </g>
      </svg>
    );
  }
  if (kind === 'project') {
    return (
      <svg viewBox="0 0 400 300" style={{width:'100%', height:'100%'}}>
        <rect width="400" height="300" fill="#16213A"/>
        <g opacity="0.5">
          {[...Array(20)].map((_, i) => (
            <circle key={i}
              cx={Math.random() * 400}
              cy={Math.random() * 300}
              r={Math.random() * 1 + 0.5}
              fill="#FBF7EE"
            />
          ))}
        </g>
        <ellipse cx="200" cy="150" rx="140" ry="40" fill="none" stroke="#FBF7EE" strokeWidth="1.5" strokeDasharray="4 4" opacity="0.4"/>
        <circle cx="200" cy="150" r="28" fill="#F4B92A" stroke="#FBF7EE" strokeWidth="2"/>
        <circle cx="330" cy="150" r="12" fill="#EC6A4C" stroke="#FBF7EE" strokeWidth="2"/>
        <g transform="translate(30, 260)">
          <text fontFamily="LEMON MILK, sans-serif" fontWeight="700" fontSize="16" fill="#FBF7EE" letterSpacing="0.04em">ORBITAL MOTION · PRESENTING</text>
        </g>
        <g transform="translate(330, 25)">
          <rect x="0" y="0" width="40" height="20" rx="10" fill="#FBF7EE"/>
          <text x="20" y="14" fontFamily="JetBrains Mono, monospace" fontSize="10" fill="#16213A" textAnchor="middle">1.0×</text>
        </g>
      </svg>
    );
  }
  if (kind === 'lesson') {
    return (
      <svg viewBox="0 0 400 300" style={{width:'100%', height:'100%'}}>
        <rect width="400" height="300" fill="#F3ECDA"/>
        {/* Worksheet paper */}
        <g transform="translate(40, 30)">
          <rect x="0" y="0" width="220" height="240" fill="#fff" stroke="#16213A" strokeWidth="1.5" rx="4"/>
          <rect x="0" y="0" width="220" height="36" fill="#FFD968" stroke="#16213A" strokeWidth="1.5" rx="4"/>
          <text x="12" y="23" fontFamily="LEMON MILK, sans-serif" fontWeight="500" fontSize="11" letterSpacing="0.06em" fill="#16213A">LESSON 07 · PENDULUM</text>
          {[0,1,2,3,4,5].map(i => (
            <g key={i}>
              <line x1="16" y1={60 + i * 22} x2="204" y2={60 + i * 22} stroke="#E7DEC6" strokeWidth="1"/>
            </g>
          ))}
          <circle cx="24" cy="68" r="5" fill="#1E9E84" stroke="#16213A" strokeWidth="1"/>
          <text x="36" y="72" fontFamily="DM Sans, sans-serif" fontSize="9" fill="#16213A">Predict period T at L = 1m</text>
          <circle cx="24" cy="90" r="5" fill="#1E9E84" stroke="#16213A" strokeWidth="1"/>
          <text x="36" y="94" fontFamily="DM Sans, sans-serif" fontSize="9" fill="#16213A">Change g. Record new T.</text>
          <circle cx="24" cy="112" r="5" fill="#fff" stroke="#16213A" strokeWidth="1"/>
          <text x="36" y="116" fontFamily="DM Sans, sans-serif" fontSize="9" fill="#16213A">Plot T vs √L</text>
        </g>
        {/* Discussion card */}
        <g transform="translate(230, 110)">
          <rect x="0" y="0" width="140" height="150" fill="#EC6A4C" stroke="#16213A" strokeWidth="1.5" rx="8" transform="rotate(4)"/>
          <g transform="rotate(4)">
            <text x="14" y="26" fontFamily="LEMON MILK, sans-serif" fontWeight="500" fontSize="10" letterSpacing="0.08em" fill="#FBF7EE">DISCUSS</text>
            <text x="14" y="52" fontFamily="DM Sans, sans-serif" fontSize="11" fontWeight="600" fill="#FBF7EE">Would the pendulum</text>
            <text x="14" y="66" fontFamily="DM Sans, sans-serif" fontSize="11" fontWeight="600" fill="#FBF7EE">swing on the ISS?</text>
            <text x="14" y="94" fontFamily="DM Sans, sans-serif" fontSize="10" fill="#FBF7EE" opacity="0.8">Hint: what does</text>
            <text x="14" y="108" fontFamily="DM Sans, sans-serif" fontSize="10" fill="#FBF7EE" opacity="0.8">'free fall' do to g?</text>
          </g>
        </g>
      </svg>
    );
  }
  return null;
};

const Features = () => (
  <section className="section" id="features" data-screen-label="features">
    <div className="section-head">
      <div className="eyebrow">For educators</div>
      <h2>Built for a 50-minute period.</h2>
    </div>
    <div className="feature-stack">
      {FEATURES.map((f, i) => (
        <div key={i} className={'feature-row' + (f.flip ? ' flip' : '')}>
          <div className="feature-visual"><FeatureVisual kind={f.visual}/></div>
          <div className="feature-text">
            <h3>{f.h}</h3>
            <p>{f.p}</p>
            <ul className="bullets">
              {f.bullets.map((b, j) => (
                <li key={j}>
                  <span className="check"><Icon.Check style={{width:12,height:12}}/></span>
                  <span>{b}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      ))}
    </div>
  </section>
);

// ----- How it works -----
const HOWTO = [
  {
    num: '01',
    h: 'Pick a sim.',
    p: 'Browse the library by topic, course, or the physical quantity you want to teach. Each sim opens in a second.',
    chips: ['Mechanics','Waves','E&M','Astronomy','Thermo','Modern'],
  },
  {
    num: '02',
    h: 'Project, then poke.',
    p: 'Throw it on the board. Drag a slider mid-sentence. Ask students which variable to tweak — they will tell you.',
    chips: ['Fullscreen','Scrub','Rewind','Reset'],
  },
  {
    num: '03',
    h: 'Send the worksheet.',
    p: 'Share a link. Students open the same sim on their laptops with their own parameters. No login, no install.',
    chips: ['Shareable link','Student view','Export data'],
  },
];

const HowTo = () => (
  <section className="section" id="howto" data-screen-label="howto">
    <div className="section-head">
      <div className="eyebrow">How it works</div>
      <h2>Three steps. One class period.</h2>
    </div>
    <div className="howto-grid">
      {HOWTO.map((s, i) => (
        <div key={i} className="howto-card">
          <span className="num">{s.num}</span>
          <h3>{s.h}</h3>
          <p>{s.p}</p>
          <div className="chip-list">
            {s.chips.map(c => <span key={c}>{c}</span>)}
          </div>
        </div>
      ))}
    </div>
  </section>
);

// ----- FAQ -----
const FAQS = [
  {
    q: 'Do students need an account?',
    a: 'No. Anything you send a student is a link — they open it, it runs. Accounts are only for teachers who want to save their own parameter sets and track worksheet responses.',
  },
  {
    q: 'What equipment does it need?',
    a: 'A browser. Anything from the last five years — Chrome, Safari, Firefox, Edge, on Windows, macOS, ChromeOS, iPad, or Android. We do not use Flash, Java, or WebGL, so school IT allowlists are rarely an issue.',
  },
  {
    q: 'Is the physics accurate, or is it just animated?',
    a: 'Every sim integrates real equations — Kepler\'s equation for orbits, the pendulum ODE with damping, superposition for waves. The math is the math. What we simplify is scale and friction constants so things fit on one screen; those are always disclosed in the sim notes.',
  },
  {
    q: 'How does this compare to PhET?',
    a: 'PhET is great. Orbit Lab is narrower — fewer sims, but every sim ships with a lesson plan, a worksheet, and a present mode designed for a modern classroom projector. Use both.',
  },
  {
    q: 'Can I use this offline?',
    a: 'Once a sim has loaded, it keeps running without a connection. We do not yet have a full offline app, but a stable internet connection is only needed on first load per device.',
  },
  {
    q: 'Who makes Orbit Lab?',
    a: 'A small team of former physics teachers and simulation engineers. Based in Amsterdam and Boston. Every sim is reviewed by at least two practicing high-school or university instructors before it goes live.',
  },
];

const FAQ = () => {
  const [open, setOpen] = useState(0);
  return (
    <section className="section" id="faq" data-screen-label="faq">
      <div className="section-head">
        <div className="eyebrow">Questions</div>
        <h2>Before you try it.</h2>
      </div>
      <div className="faq-wrap">
        {FAQS.map((f, i) => (
          <div key={i} className={'faq' + (open === i ? ' open' : '')}>
            <button className="faq-q" onClick={() => setOpen(open === i ? -1 : i)} aria-expanded={open === i}>
              <span>{f.q}</span>
              <span className="plus"><Icon.Plus style={{width:14,height:14}}/></span>
            </button>
            <div className="faq-a">{f.a}</div>
          </div>
        ))}
      </div>
    </section>
  );
};

// ----- Footer -----
const Footer = () => (
  <footer className="footer" data-screen-label="footer">
    <div className="footer-inner">
      <div className="footer-grid">
        <div className="footer-brand">
          <div style={{display:'flex', alignItems:'center', gap: 10, color: '#FBF7EE', fontFamily:'LEMON MILK, sans-serif', fontWeight: 700, fontSize: 20, letterSpacing: '0.04em'}}>
            <svg viewBox="0 0 48 48" width="32" height="32">
              <ellipse cx="24" cy="24" rx="20" ry="8" fill="none" stroke="#FBF7EE" strokeWidth="2"/>
              <circle cx="24" cy="24" r="5" fill="#F4B92A" stroke="#FBF7EE" strokeWidth="2"/>
              <circle cx="43" cy="24" r="3" fill="#EC6A4C" stroke="#FBF7EE" strokeWidth="2"/>
            </svg>
            ORBIT LAB
          </div>
          <p className="tag">Physics and astronomy simulations for the classroom. Made by former teachers.</p>
        </div>
        <div>
          <h6>Sims</h6>
          <a href="#sims">Mechanics</a>
          <a href="#sims">Waves</a>
          <a href="#sims">Astronomy</a>
          <a href="#sims">Electromagnetism</a>
        </div>
        <div>
          <h6>Teachers</h6>
          <a href="#howto">How it works</a>
          <a href="#features">Lesson plans</a>
          <a href="#faq">FAQ</a>
          <a href="#features">Project mode</a>
        </div>
        <div>
          <h6>Team</h6>
          <a href="#">About</a>
          <a href="#">Changelog</a>
          <a href="#">Contact</a>
          <a href="#">Press kit</a>
        </div>
      </div>
      <div className="footer-bottom">
        <span>© 2026 Orbit Lab — Amsterdam + Boston</span>
        <span className="sym">a = GM/r²</span>
      </div>
    </div>
  </footer>
);

// ----- Root -----
const App = () => (
  <div className="site">
    <Nav/>
    <Hero/>
    <SimLibrary/>
    <Features/>
    <HowTo/>
    <FAQ/>
    <Footer/>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
